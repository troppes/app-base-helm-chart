name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "app-base/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Check version does not already exist
        run: |
          CHART_VERSION=$(grep '^version:' app-base/Chart.yaml | awk '{print $2}')
          echo "Chart version: $CHART_VERSION"
          if helm pull \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts/app-base \
            --version "$CHART_VERSION" \
            --destination /tmp 2>/dev/null; then
            echo "ERROR: version $CHART_VERSION already exists in the registry. Bump the version in Chart.yaml."
            exit 1
          fi
          echo "Version $CHART_VERSION is new — proceeding."

      - name: Package chart
        run: helm package app-base --destination /tmp/charts

      - name: Push chart
        run: |
          helm push /tmp/charts/app-base-*.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts
