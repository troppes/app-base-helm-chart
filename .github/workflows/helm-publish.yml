name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "helm-charts/app-base/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        run: helm package helm-charts/app-base --destination /tmp/charts

      - name: Push chart
        run: |
          helm push /tmp/charts/app-base-*.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts
