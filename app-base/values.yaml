replicaCount: 1
revisionHistoryLimit: 1

image:
  repository: ""
  tag: ""
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 50m
    memory: 128Mi
    ephemeral-storage: 100Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi

updateStrategy:
  type: RollingUpdate

serviceAccount:
  create: false
  automountToken: false
  name: ""
  annotations: {}

podSecurityContext: {}
  # fsGroup: 1000
  # runAsNonRoot: true
  # runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  # capabilities:
  #   drop: [ALL]
  # runAsNonRoot: true
  # runAsUser: 1000
  # readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  # Override if the container listens on a different port than the service exposes
  containerPort: ""
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

command: []
args: []

env: []
envFrom: []

volumes: []
volumeMounts: []

initContainers: []

vpn:
  enabled: false
  image:
    repository: ""
    tag: ""
    pullPolicy: Always
  env: []
  envFrom: []
  securityContext:
    privileged: false
    capabilities:
      add:
        - NET_ADMIN
        - SYS_MODULE
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 100Mi
    limits:
      cpu: 200m
      memory: 128Mi
      ephemeral-storage: 256Mi
  volumeMounts: []

probes:
  liveness:
    enabled: false
    httpGet:
      path: /
      port: http
  readiness:
    enabled: false
    httpGet:
      path: /
      port: http
  startup:
    enabled: false
    httpGet:
      path: /
      port: http
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
    initialDelaySeconds: 0
